<!DOCTYPE html>
<html lang="de">
<head>

    <title>Swiss Arrows Ecosystem - Restructured</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, sans-serif;
        }
        
        .container {
            max-width: 1400px;
            width: 100%;
        }
        
        svg {
            width: 100%;
            height: auto;
        }
        
        /* Animation for connections */
        @keyframes flowPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }
        
        .connection-line {
            animation: flowPulse 3s ease-in-out infinite;
        }
        
        .product-box:hover {
            filter: brightness(1.1);
            cursor: pointer;
        }
        
        .product-box {
            transition: all 0.3s ease;
        }
        
        @media print {
            body {
                background: white;
            }
        }
    </style>
</head>
